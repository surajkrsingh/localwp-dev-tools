name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build addon
        run: npm run build

      - name: Package distribution zip
        run: npm run package

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: LocalWP Dev Tools ${{ steps.version.outputs.VERSION }}
          body: |
            ## Installation

            1. Download `localwp-dev-tools-${{ steps.version.outputs.VERSION }}.zip` below
            2. Open LocalWP → **Add-ons** → **Install from Disk**
            3. Select the downloaded `.zip` file
            4. Restart LocalWP

            See [README](https://github.com/${{ github.repository }}#readme) for full feature list.
          files: dist/localwp-dev-tools-*.zip
          draft: false
          prerelease: false
